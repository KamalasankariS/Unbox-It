name: Demo GIF

# Renders docs/demo.gif from demo.tape against the live API and commits it.
# Run it by hand from the Actions tab (no local tools needed).
on:
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      # Wake the free Render instance first so the recorded requests are fast, not a
      # 50-second cold start.
      - name: Warm up the live demo
        run: curl -sS --max-time 120 https://unbox-it.onrender.com/health || true

      - name: Render the GIF
        uses: charmbracelet/vhs-action@v2
        with:
          path: demo.tape

      - name: Commit the GIF
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/demo.gif
          git commit -m "docs: regenerate demo gif" || echo "no changes to commit"
          git push
