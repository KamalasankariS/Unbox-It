name: CD

# Runs only after the CI workflow succeeds on main, so a failing build never deploys.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  publish:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      # GHCR image names must be lowercase; the owner/repo may contain capitals.
      - name: Compute lowercase image name
        run: echo "IMAGE=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}

      # Optional: if you set a RENDER_DEPLOY_HOOK_URL secret, this pings Render to pull the
      # new image. If you connect the repo as a Render Blueprint instead, Render auto-deploys
      # on push and this step is a harmless no-op.
      - name: Trigger Render deploy (if configured)
        env:
          HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -n "$HOOK" ]; then
            curl -fsSL -X POST "$HOOK" && echo "Render deploy triggered."
          else
            echo "No RENDER_DEPLOY_HOOK_URL secret set; image published to GHCR only."
          fi
